<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Browser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toolbar">
    <button id="backBtn">←</button>
    <button id="forwardBtn">→</button>
    <button id="reloadBtn">↻</button>
    <input type="text" id="urlInput" placeholder="Enter URL (youtube.com, etc.)" autocomplete="off">
    <button id="goBtn">Go</button>
    <button id="newTabBtn">+ New Tab</button>
  </div>

  <div id="tabsBar" class="tabs"></div>

  <iframe id="mainFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>

  <script src="script.js"></script>
</body>
</html>
